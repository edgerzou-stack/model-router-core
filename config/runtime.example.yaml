runtime:
  approval_after_plan: true
  strategy: rule_based

roles:
  premium:
    provider: openai
    model: gpt-5.5
    api_key_env: OPENAI_API_KEY
  cheap:
    provider: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY

routing:
  escalate_on:
    - ambiguous
    - high_risk
    - cross_boundary
    - auth_billing_data
